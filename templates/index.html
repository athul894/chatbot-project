<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBot — College Enquiry Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --text2: #9aa0b8;
    --accent: #6c7ef8;
    --accent2: #8b5cf6;
    --accent-glow: rgba(108,126,248,0.15);
    --user-bg: linear-gradient(135deg, #6c7ef8, #8b5cf6);
    --bot-bg: #1e2333;
    --success: #34d399;
    --warn: #f59e0b;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    padding: 0 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--user-bg);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text2);
    font-weight: 300;
  }

  .quick-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text2);
    padding: 0 8px;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .quick-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    text-align: left;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    width: 100%;
    margin-bottom: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quick-btn:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--text);
  }

  .quick-btn .q-icon { font-size: 14px; }

  .sidebar-footer {
    margin-top: auto;
    padding: 12px 8px 0;
    border-top: 1px solid var(--border);
  }

  .admin-link {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    padding: 8px 0;
    transition: color 0.15s;
  }

  .admin-link:hover { color: var(--accent); }

  /* ── Main Chat ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }

  .chat-title {
    font-size: 15px;
    font-weight: 500;
  }

  .status-badge {
    font-size: 12px;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Messages ── */
  .chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chatbox::-webkit-scrollbar { width: 4px; }
  .chatbox::-webkit-scrollbar-track { background: transparent; }
  .chatbox::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .bot-avatar {
    background: var(--user-bg);
    font-size: 16px;
  }

  .user-avatar {
    background: var(--bg3);
    border: 1px solid var(--border2);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .bubble {
    max-width: 72%;
    min-width: 60px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }

  .bot-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .user-bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
    color: white;
  }

  .bubble-meta {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg-row.user .bubble-meta { text-align: right; }

  .pending-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(245,158,11,0.12);
    color: var(--warn);
    border-radius: 20px;
    margin-top: 6px;
    border: 1px solid rgba(245,158,11,0.2);
  }

  /* ── Typing indicator ── */
  .typing-bubble {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Welcome screen ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-align: center;
    padding: 24px;
    color: var(--text2);
  }

  .welcome-icon { font-size: 48px; margin-bottom: 8px; }
  .welcome h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    font-weight: 400;
  }
  .welcome p { font-size: 14px; max-width: 340px; line-height: 1.6; }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .chip {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--text);
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--text2); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--user-bg);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.3; cursor: default; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 8px;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .bubble { max-width: 88%; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div>
      <div class="logo-text">EduBot</div>
      <div class="logo-sub">College Assistant</div>
    </div>
  </div>

  <div class="quick-label">Quick Questions</div>

  <button class="quick-btn" onclick="askQuick('What courses do you offer?')">
    <span class="q-icon">📚</span> Courses & Programs
  </button>
  <button class="quick-btn" onclick="askQuick('What is the fee for CSE?')">
    <span class="q-icon">💰</span> Fees & Charges
  </button>
  <button class="quick-btn" onclick="askQuick('Tell me about admissions')">
    <span class="q-icon">📝</span> Admissions
  </button>
  <button class="quick-btn" onclick="askQuick('What are the placement stats?')">
    <span class="q-icon">🏢</span> Placements
  </button>
  <button class="quick-btn" onclick="askQuick('Is hostel available?')">
    <span class="q-icon">🏠</span> Hostel
  </button>
  <button class="quick-btn" onclick="askQuick('Scholarship information')">
    <span class="q-icon">🎖️</span> Scholarships
  </button>
  <button class="quick-btn" onclick="askQuick('College timings')">
    <span class="q-icon">🕐</span> Timings
  </button>
  <button class="quick-btn" onclick="askQuick('How to contact you?')">
    <span class="q-icon">📞</span> Contact Us
  </button>

  {% if is_admin %}
  <div class="sidebar-footer">
    <a href="/admin" class="admin-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
      Admin Panel
    </a>
    <a href="/logout" class="admin-link" style="margin-top:4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </a>
  </div>
  {% endif %}
</aside>

<!-- Main chat area -->
<main class="main">
  <header class="chat-header">
    <span class="chat-title">College Enquiry Chatbot</span>
    <span class="status-badge">
      <span class="status-dot"></span>
      Online
    </span>
  </header>

  <div class="chatbox" id="chatbox">
    <!-- Welcome shown initially -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🎓</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything about admissions, courses, fees, placements, hostel, or campus life.</p>
      <div class="welcome-chips">
        <button class="chip" onclick="askQuick('What courses are available?')">Courses</button>
        <button class="chip" onclick="askQuick('Fee for BCA')">BCA Fees</button>
        <button class="chip" onclick="askQuick('Admission process')">Admissions</button>
        <button class="chip" onclick="askQuick('Placement statistics')">Placements</button>
        <button class="chip" onclick="askQuick('Library timings')">Library</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Ask anything about the college..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</main>

<script>
  const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2, 10);
  let messageCount = 0;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function askQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(content, isUser, meta = null) {
    hideWelcome();
    const chatbox = document.getElementById('chatbox');

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isUser ? 'user' : 'bot');

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (isUser ? 'user-avatar' : 'bot-avatar');
    avatar.textContent = isUser ? 'U' : '🎓';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isUser ? 'user-bubble' : 'bot-bubble');
    bubble.textContent = content;
    wrap.appendChild(bubble);

    if (meta) {
      const m = document.createElement('div');
      m.className = 'bubble-meta';
      m.textContent = meta;
      wrap.appendChild(m);
    }

    row.appendChild(avatar);
    row.appendChild(wrap);
    chatbox.appendChild(row);
    chatbox.scrollTop = chatbox.scrollHeight;
    return bubble;
  }

  function showTyping() {
    hideWelcome();
    const chatbox = document.getElementById('chatbox');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot-avatar';
    avatar.textContent = '🎓';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot-bubble typing-bubble';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'typing-dot';
      bubble.appendChild(dot);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatbox.appendChild(row);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const message = input.value.trim();
    if (!message) return;

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    // Show user message
    appendMessage(message, true);
    showTyping();

    try {
      const res = await fetch('/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, session_id: SESSION_ID })
      });

      const data = await res.json();
      hideTyping();

      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      appendMessage(data.response, false, now);

      // Show pending tag if unknown (data.pending is true when forwarded to admin)
      if (data.pending) {
        const chatbox = document.getElementById('chatbox');
        const tag = document.createElement('div');
        tag.style.paddingLeft = '42px';
        const pill = document.createElement('span');
        pill.className = 'pending-tag';
        pill.textContent = '⏳ Sent to admin for review';
        tag.appendChild(pill);
        chatbox.appendChild(tag);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

    } catch (err) {
      hideTyping();
      appendMessage('Connection error. Please try again.', false);
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
