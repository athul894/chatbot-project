<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EduBot</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #181c27;
  --bg3: #1e2333;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2f8;
  --text2: #9aa0b8;
  --accent: #6c7ef8;
  --accent-glow: rgba(108,126,248,0.15);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 40px;
  border-radius: 14px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  margin-bottom: 6px;
}

.sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
}

.error-box {
  background: rgba(248,113,113,0.1);
  color: #f87171;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 13px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #6c7ef8, #8b5cf6);
  color: white;
  cursor: pointer;
}

a {
  display: block;
  margin-top: 12px;
  color: var(--text2);
  text-decoration: none;
}

a:hover {
  color: var(--accent);
}
</style>
</head>

<body>

<div class="login-card">
  <div class="logo">🎓 EduBot</div>
  <div class="sub">Admin Login</div>

  {% if error %}
    <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <a href="/">← Back to Chatbot</a>
</div>

</body>
</html>
